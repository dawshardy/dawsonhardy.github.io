name: Update Spotify Now Playing

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

# prevents overlapping runs fighting each other
concurrency:
  group: spotify-now-playing
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install deps
        run: pip install requests

      - name: Update spotify JSON
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: python scripts/update_spotify.py

      - name: Commit and push
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add assets/data/spotify.json

          # If nothing changed, stop cleanly.
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update Spotify now playing"

          # Pull latest and rebase to avoid non-fast-forward
          git pull --rebase origin main

          # Push. If someone slipped a commit in, rebase again once and retry.
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main)
