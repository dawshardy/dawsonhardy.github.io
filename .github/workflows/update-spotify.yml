name: Update Spotify Now Playing

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: spotify-now-playing
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      #  IMPORTANT: sync FIRST (clean repo), THEN create file changes
      - name: Sync with main (rebase)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull --rebase origin main

      - name: Update spotify JSON
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: |
          python scripts/update_spotify.py

      - name: Commit & push (safe)
        run: |
          set -e

          # If nothing changed, exit cleanly
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add assets/data/spotify.json
          git commit -m "Update Spotify now playing"

          # Retry push a few times (handles races)
          for i in 1 2 3 4 5 6; do
            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed (attempt $i). Re-syncing and retrying..."
            git fetch origin main
            git pull --rebase origin main
          done

          echo "Push failed after retries."
          exit 1
