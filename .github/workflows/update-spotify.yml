name: Update Spotify Now Playing

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: spotify-now-playing
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # Make workspace EXACTLY match origin/main BEFORE editing files
      - name: Sync workspace to origin/main (clean)
        run: |
          set -e
          git fetch origin main
          # Force local main to track origin/main, even if checkout gave us detached HEAD
          git checkout -B main origin/main
          git reset --hard origin/main
          git clean -fd

      - name: Update spotify JSON
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: |
          python scripts/update_spotify.py

      - name: Commit & push (retry-safe)
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/data/spotify.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update Spotify now playing"

          # Try pushing; if rejected, rebase and retry a few times
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Pushed successfully."
              exit 0
            fi
            echo "Push rejected (attempt $i). Rebasing and retrying..."
            git fetch origin main
            git rebase origin/main
          done

          echo "Failed to push after retries."
          exit 1
