name: Update Spotify Now Playing

on:
  workflow_dispatch:
  # Uncomment after it's working:
  # schedule:
  #   - cron: "*/5 * * * *"

concurrency:
  group: spotify-now-playing
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # Make workspace EXACTLY match origin/main BEFORE we modify any files
      - name: Sync workspace to origin/main (clean)
        run: |
          set -e
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

      - name: Update spotify JSON
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: |
          python scripts/update_spotify.py

      - name: Commit & push (retry)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/data/spotify.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update Spotify now playing"

          # retry loop for race conditions
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              echo "Pushed successfully."
              exit 0
            fi
            echo "Push failed (attempt $i). Retrying..."
            sleep 2
          done

          echo "Failed to push after retries."
          exit 1
